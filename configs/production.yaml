# Production configuration overlay. Secrets (database.url, redis.url, tracing
# endpoint) must come from the environment, never this file.

app:
  shutdown_timeout: 30s

http:
  enabled: false
  host: 0.0.0.0
  port: 8080
  read_timeout: 30s
  read_header_timeout: 10s
  write_timeout: 60s
  idle_timeout: 120s
  request_timeout: 60s
  cors:
    allowed_origins: ["https://app.agnivo.dev"]
    allow_credentials: true

log:
  level: info
  format: json

database:
  enabled: true
  max_conns: 50
  min_conns: 5

redis:
  enabled: true
  pool_size: 50

observability:
  admin_host: 0.0.0.0
  admin_port: 9090
  tracing:
    enabled: true
    exporter: otlp
    sampler: 0.1

security:
  enable_hsts: true
  max_request_body_bytes: 10485760
